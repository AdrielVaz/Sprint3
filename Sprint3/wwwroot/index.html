<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Tela de Login</title>
    <style>
        :root {
            --bg-deep: #0c1222;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.15);
            --text: #e8edf5;
            --text-muted: #8b9cb8;
            --sidebar-bg: rgba(18, 26, 46, 0.72);
            --sidebar-border: rgba(255, 255, 255, 0.06);
            --list-bg: rgba(248, 250, 252, 0.97);
            --list-border: rgba(15, 23, 42, 0.06);
            --card-bg: #ffffff;
            --column-width: 286px;
            --header-h: 56px;
            --radius-lg: 14px;
            --radius-md: 10px;
            --shadow-card: 0 4px 14px rgba(15, 23, 42, 0.08), 0 0 1px rgba(15, 23, 42, 0.06);
            --shadow-card-hover: 0 10px 28px rgba(15, 23, 42, 0.12), 0 0 1px rgba(15, 23, 42, 0.08);
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Outfit", system-ui, sans-serif;
            color: var(--text);
            background-color: var(--bg-deep);
            background-image: radial-gradient(ellipse 120% 80% at 10% -20%, rgba(34, 211, 238, 0.18), transparent 50%), radial-gradient(ellipse 90% 60% at 100% 0%, rgba(99, 102, 241, 0.14), transparent 45%), radial-gradient(ellipse 70% 50% at 50% 100%, rgba(14, 165, 233, 0.12), transparent 55%);
            background-attachment: fixed;
        }
        .input-group-text {
            cursor: pointer;
        }
        .container {
            display: flex;
            flex-direction: column;
            margin: 100px auto;
            width: 400px;
            padding: 32px 40px;
            background: rgb(255, 255, 255);
            border-radius: 3px;
            box-shadow: rgba(0, 0, 0, 0.1) 0px 0px 10px;
            box-sizing: border-box;
        }
        .img-icon {
            width: 100px;
        }
        .img-h1 {
            text-align: center;
        }
        .brand-name {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #999, #ccc, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* suporte extra */
            background-clip: text;
            color: transparent;
        }
        button {
            margin-top: 20px;
        }
        .form-label {
            font-weight: bold;
        }
        .alert{
            display: none;
        }
        label{
            color:black

        }
        p {
            color: black
        }
    </style> 
</head>

<body>
    <div class="container">
        <div class="text-cente">
            <h1 class="img-h1"><img src="./Assets/ChatGPT Image 6 de mai. de 2026, 11_17_50.png" class="img-icon"
                    alt=""></h1>
            <p class="text-center text-primary fw-bold">Faça login para continuar</p>
        </div>

        <div id="errorMessage" class="alert alert-danger"></div>
        <div id="successMessage" class="alert alert-success"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text">📧</span>
                    <input id="email" type="email" class="form-control" placeholder="seu@email.com">
                </div>
            </div>
            <div class="form-label">
                <label for="password">Senha</label>
                <div class="input-group">
                    <i class="input-group-text">🔒</i>
                    <input class="form-control" type="password" id="password" name="password"
                        placeholder="Digite sua senha" required>
                    <span class="input-group-text" onclick="togglePassword()">👁</span>
                </div>
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" id="remember">
                    <span>Lembrar-me</span>
                </label>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <div class="register">
            <p>Não tem uma conta? <a href="/cadastro">Registre-se</a></p>
        </div>
        <div class="brand-name">TASKPI</div>
    </div>

    <script>
        // Função para mostrar/ocultar senha
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // Função para mostrar mensagens de erro/sucesso
        function showMessage(type, message) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            if (type === 'error') {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';

                // Esconder mensagem após 3 segundos
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            } else if (type === 'success') {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
            }
        }

        // Função de validação de email
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Função de validação de senha
        function validatePassword(password) {
            return password.length >= 6;
        }

        // Event listener do formulário
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const submitBtn = document.querySelector('#loginForm button[type="submit"]');

            if (!email || !password) {
                showMessage('error', 'Por favor, preencha todos os campos!');
                return;
            }

            if (!validateEmail(email)) {
                showMessage('error', 'Por favor, insira um email valido!');
                return;
            }

            if (!validatePassword(password)) {
                showMessage('error', 'A senha deve ter pelo menos 6 caracteres!');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Entrando...';

            try {
                const response = await fetch('/api/Auth/Login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        senha: password
                    })
                });

                let payload = {};
                try {
                    payload = await response.json();

                } catch {
                    payload = {};
                }

                if (!response.ok) {
                    throw new Error(payload.message || 'Falha no login.');
                }

                showMessage('success', 'Login realizado com sucesso!');   

                if (remember) {
                    localStorage.setItem('rememberedEmail', email);
                    localStorage.setItem('rememberMe', 'true');
                } else {
                    localStorage.removeItem('rememberedEmail');
                    localStorage.removeItem('rememberMe');
                }

                setTimeout(() => {
                    window.location.href = '/mainscreen';
                    console.log('Usuario logado:', payload);
                }, 1000);
            } catch (error) {
                showMessage('error', error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar';
            }
        });

        // Carregar email salvo se "lembrar-me" estiver ativo
        window.addEventListener('load', function () {
            const rememberMe = localStorage.getItem('rememberMe');
            const rememberedEmail = localStorage.getItem('rememberedEmail');

            if (rememberMe === 'true' && rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember').checked = true;
            }
        });

        // Efeito de animação nos inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function () {
                this.parentElement.style.transform = 'scale(1.02)';
            });

            input.addEventListener('blur', function () {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
