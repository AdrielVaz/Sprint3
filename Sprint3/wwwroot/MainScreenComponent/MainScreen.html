<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASKPI — Quadro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        :root {
            --bg-deep: #0c1222;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.15);
            --text: #e8edf5;
            --text-muted: #8b9cb8;
            --sidebar-bg: rgba(18, 26, 46, 0.72);
            --sidebar-border: rgba(255, 255, 255, 0.06);
            --list-bg: rgba(248, 250, 252, 0.97);
            --list-border: rgba(15, 23, 42, 0.06);
            --card-bg: #ffffff;
            --column-width: 286px;
            --header-h: 56px;
            --radius-lg: 14px;
            --radius-md: 10px;
            --shadow-card: 0 4px 14px rgba(15, 23, 42, 0.08), 0 0 1px rgba(15, 23, 42, 0.06);
            --shadow-card-hover: 0 10px 28px rgba(15, 23, 42, 0.12), 0 0 1px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Outfit", system-ui, sans-serif;
            color: var(--text);
            background-color: var(--bg-deep);
            background-image: radial-gradient(ellipse 120% 80% at 10% -20%, rgba(34, 211, 238, 0.18), transparent 50%), radial-gradient(ellipse 90% 60% at 100% 0%, rgba(99, 102, 241, 0.14), transparent 45%), radial-gradient(ellipse 70% 50% at 50% 100%, rgba(14, 165, 233, 0.12), transparent 55%);
            background-attachment: fixed;
        }

        .app-header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            flex-shrink: 0;
            background: rgba(12, 18, 34, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

            .app-header .brand-wrap {
                display: flex;
                align-items: center;
                gap: 0.65rem;
            }

            .app-header .logo-mark {
                width: 34px;
                height: 34px;
                border-radius: 10px;
                background: linear-gradient(135deg, var(--accent), #6366f1);
                display: grid;
                place-items: center;
                font-size: 1rem;
                font-weight: 800;
                color: #0c1222;
                box-shadow: 0 4px 14px rgba(34, 211, 238, 0.35);
            }

            .app-header .brand {
                font-weight: 700;
                letter-spacing: 0.04em;
                font-size: 1.05rem;
                background: linear-gradient(90deg, #fff, #94a3b8);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }

            .app-header .btn-leave {
                display: inline-flex;
                align-items: center;
                gap: 0.35rem;
                padding: 0.45rem 0.9rem;
                border-radius: 999px;
                font-size: 0.85rem;
                font-weight: 500;
                color: var(--text-muted);
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.08);
                text-decoration: none;
                transition: color 0.2s, background 0.2s, border-color 0.2s;
            }

                .app-header .btn-leave:hover {
                    color: #fff;
                    background: rgba(255, 255, 255, 0.1);
                    border-color: rgba(255, 255, 255, 0.14);
                }

        .layout {
            display: flex;
            height: calc(100vh - var(--header-h));
            overflow: hidden;
        }

        .sidebar {
            width: 272px;
            min-width: 272px;
            margin: 0.75rem;
            margin-right: 0;
            padding: 1rem;
            border-radius: var(--radius-lg);
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--sidebar-border);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        .sidebar-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-muted);
            font-weight: 600;
            padding-left: 0.15rem;
        }

        .btn-new-project {
            width: 100%;
            border: none;
            border-radius: var(--radius-md);
            padding: 0.55rem 0.85rem;
            font-weight: 600;
            font-size: 0.88rem;
            color: #0c1222;
            background: linear-gradient(135deg, #22d3ee, #38bdf8);
            box-shadow: 0 4px 18px rgba(34, 211, 238, 0.35);
            transition: transform 0.15s, box-shadow 0.2s;
        }

            .btn-new-project:hover {
                transform: translateY(-1px);
                box-shadow: 0 8px 24px rgba(34, 211, 238, 0.45);
                color: #0c1222;
            }

        .projeto-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
            margin-top: 0.25rem;
        }

            .projeto-list::-webkit-scrollbar {
                width: 6px;
            }

            .projeto-list::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.12);
                border-radius: 99px;
            }

        .projeto-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            text-align: left;
            padding: 0.55rem 0.7rem;
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.18s, border-color 0.18s, box-shadow 0.18s;
        }

            .projeto-item .folder-icon {
                opacity: 0.55;
                font-size: 0.95rem;
            }

            .projeto-item:hover {
                background: rgba(255, 255, 255, 0.06);
                border-color: rgba(255, 255, 255, 0.06);
            }

            .projeto-item.active {
                background: var(--accent-dim);
                border-color: rgba(34, 211, 238, 0.35);
                box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.12);
                color: #fff;
            }

                .projeto-item.active .folder-icon {
                    opacity: 1;
                }

        .sidebar-hint {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.4;
            padding: 0.35rem 0.15rem 0;
        }

        .board-wrap {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0.75rem 1rem 1rem 0.75rem;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

            .board-wrap::-webkit-scrollbar {
                height: 8px;
            }

            .board-wrap::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.12);
                border-radius: 99px;
            }

        .board-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.85rem;
            flex-wrap: wrap;
        }

        .board-title {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            color: #fff;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.25);
        }

        .board-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .empty-board {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .empty-board-inner {
            text-align: center;
            max-width: 380px;
            padding: 2rem;
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(255, 255, 255, 0.12);
        }

            .empty-board-inner .orb {
                width: 72px;
                height: 72px;
                margin: 0 auto 1rem;
                border-radius: 50%;
                background: linear-gradient(145deg, rgba(34, 211, 238, 0.35), rgba(99, 102, 241, 0.25));
                box-shadow: 0 12px 40px rgba(34, 211, 238, 0.2);
            }

            .empty-board-inner p {
                margin: 0;
                color: var(--text-muted);
                font-size: 0.95rem;
                line-height: 1.55;
            }

        #boardContent {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .board-columns {
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
            flex: 1;
            min-height: 0;
        }

        .column {
            width: var(--column-width);
            min-width: var(--column-width);
            max-height: 100%;
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            background: var(--list-bg);
            border: 1px solid var(--list-border);
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.1);
            overflow: hidden;
        }

            .column.col-alta {
                --col-accent: #f43f5e;
            }

            .column.col-media {
                --col-accent: #f59e0b;
            }

            .column.col-baixa {
                --col-accent: #10b981;
            }

            .column.col-done {
                --col-accent: #6366f1;
            }

        .column-header {
            padding: 0.75rem 0.85rem;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.98));
        }

        .column-title-row {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            min-width: 0;
        }

        .col-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--col-accent, #64748b);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--col-accent, #64748b) 28%, transparent);
        }

        .column-header .count {
            background: rgba(15, 23, 42, 0.06);
            color: #475569;
            border-radius: 999px;
            padding: 0.15rem 0.5rem;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .column-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.55rem;
            min-height: 140px;
            max-height: calc(100vh - var(--header-h) - 160px);
            transition: background 0.2s;
            background: rgba(241, 245, 249, 0.45);
        }

            .column-body::-webkit-scrollbar {
                width: 6px;
            }

            .column-body::-webkit-scrollbar-thumb {
                background: rgba(15, 23, 42, 0.12);
                border-radius: 99px;
            }

            .column-body.drag-over {
                background: rgba(34, 211, 238, 0.12);
                outline: 2px dashed rgba(34, 211, 238, 0.45);
                outline-offset: -4px;
                border-radius: var(--radius-md);
            }

        .card-task {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 0.65rem 0.75rem 0.65rem 0.85rem;
            margin-bottom: 8px;
            cursor: grab;
            font-size: 0.89rem;
            position: relative;
            border: 1px solid rgba(15, 23, 42, 0.06);
            box-shadow: var(--shadow-card);
            border-left: 4px solid var(--prio-border, #cbd5e1);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

            .card-task:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-card-hover);
            }

            .card-task:active {
                cursor: grabbing;
            }

            .card-task.prio-alta {
                --prio-border: #f43f5e;
            }

            .card-task.prio-media {
                --prio-border: #f59e0b;
            }

            .card-task.prio-baixa {
                --prio-border: #10b981;
            }

            .card-task .prio-badge {
                display: inline-block;
                font-size: 0.62rem;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                padding: 0.2rem 0.45rem;
                border-radius: 6px;
                margin-bottom: 6px;
            }

        .prio-alta.badge-fill {
            background: rgba(244, 63, 94, 0.12);
            color: #be123c;
        }

        .prio-media.badge-fill {
            background: rgba(245, 158, 11, 0.15);
            color: #b45309;
        }

        .prio-baixa.badge-fill {
            background: rgba(16, 185, 129, 0.12);
            color: #047857;
        }

        .card-task .title {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 4px;
            word-break: break-word;
            line-height: 1.35;
        }

        .card-task .desc-preview {
            font-size: 0.78rem;
            color: #64748b;
            max-height: 2.5em;
            overflow: hidden;
            line-height: 1.4;
        }

        .card-actions {
            position: absolute;
            top: 6px;
            right: 6px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .card-task:hover .card-actions {
            opacity: 1;
        }

        .btn-icon {
            border: none;
            background: rgba(241, 245, 249, 0.95);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.72rem;
            cursor: pointer;
            color: #64748b;
            transition: background 0.15s, color 0.15s;
        }

            .btn-icon:hover {
                background: #fee2e2;
                color: #dc2626;
            }

        .add-card-btn {
            width: calc(100% - 1rem);
            margin: 0 0.5rem 0.55rem;
            border: none;
            background: transparent;
            color: #64748b;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 0.45rem 0.55rem;
            border-radius: var(--radius-md);
            text-align: left;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

            .add-card-btn:hover {
                background: rgba(15, 23, 42, 0.05);
                color: #0f172a;
            }

        .toast-area {
            position: fixed;
            bottom: 1.25rem;
            right: 1.25rem;
            z-index: 1080;
            max-width: 340px;
        }

            .toast-area .alert {
                border: none;
                border-radius: var(--radius-md);
                font-weight: 500;
                box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
            }

        .modal-content {
            border: none;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
        }

        .modal-header {
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
            padding: 1rem 1.25rem;
            background: linear-gradient(180deg, #f8fafc, #fff);
        }

        .modal-title {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .modal-footer {
            border-top: 1px solid rgba(15, 23, 42, 0.08);
            padding: 0.85rem 1.25rem;
            background: #fafbfc;
        }

        .form-control, .form-select {
            border-radius: var(--radius-md);
            border-color: rgba(15, 23, 42, 0.12);
        }

            .form-control:focus, .form-select:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
            }

        .btn-primary {
            font-weight: 600;
            border-radius: var(--radius-md);
            padding: 0.45rem 1.1rem;
            background: linear-gradient(135deg, #0891b2, #6366f1);
            border: none;
        }

            .btn-primary:hover {
                background: linear-gradient(135deg, #06b6d4, #4f46e5);
            }

        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
                height: auto;
                min-height: calc(100vh - var(--header-h));
            }

            .sidebar {
                width: auto;
                min-width: 100%;
                margin: 0.5rem;
                max-height: 220px;
            }

            .column-body {
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="brand-wrap">
            <span class="logo-mark">T</span>
            <span class="brand">TASKPI</span>
            <span>Bem vindo: <span style="font-weight:bold" id="NameUser"></span></span>
        </div>
        <a class="btn-leave" href="/index.html">← Sair</a>
    </header>
    <div class="layout">
        <aside class="sidebar">
            <span class="sidebar-label">Seus projetos</span>
            <button type="button" class="btn-new-project" id="btnNovoProjeto">+ Novo projeto</button>
            <div class="projeto-list" id="projetoList"></div>
        </aside>
        <main class="board-wrap" id="boardWrap">
            <div class="empty-board" id="emptyState">
                <div class="empty-board-inner">
                    <div class="orb" aria-hidden="true"></div>
                    <p>Nenhum projeto selecionado. Escolha um à esquerda ou crie um novo para montar seu quadro.</p>
                </div>
            </div>
            <div id="boardContent">
                <div class="board-head">
                    <div>
                        <div class="board-title" id="boardTitle"></div>
                        <div class="board-meta" id="boardMeta"></div>
                    </div>
                </div>
                <div class="board-columns" id="boardColumns"></div>
            </div>
        </main>
    </div>

    <div class="toast-area" id="toastArea"></div>

    <div class="modal fade" id="modalProjeto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo projeto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label fw-semibold small text-secondary">Nome</label>
                    <input type="text" class="form-control" id="inputProjetoDesc" placeholder="Ex.: Website, App mobile…">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnSalvarProjeto">Criar projeto</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTarefa" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTarefaTitle">Tarefa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="tarefaId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-secondary">Título</label>
                        <input type="text" class="form-control" id="tarefaTitulo" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-secondary">Descrição</label>
                        <textarea class="form-control" id="tarefaDescricao" rows="4" placeholder="Detalhes, links, critérios…"></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small text-secondary">Prioridade</label>
                            <select class="form-select" id="tarefaPrioridade">
                                <option value="0">Alta</option>
                                <option value="1" selected>Média</option>
                                <option value="2">Baixa</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold small text-secondary">Status</label>
                            <div class="form-check mt-2 pt-1">
                                <input class="form-check-input" type="checkbox" id="tarefaConcluida">
                                <label class="form-check-label" for="tarefaConcluida">Marcar como concluída</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer justify-content-between">
                    <button type="button" class="btn btn-outline-danger" id="btnExcluirTarefa" style="display: none;">Excluir</button>
                    <div class="ms-auto">
                        <button type="button" class="btn btn-light me-2" data-bs-dismiss="modal">Fechar</button>
                        <button type="button" class="btn btn-primary" id="btnSalvarTarefa">Salvar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <script>
        const nome = localStorage.getItem("nomeUsuario");

        if (nome) {
            document.getElementById("NameUser").innerText = nome;
        }
        const API = {
            listProjetos: () => fetch('/api/Projetos/projetos/Listar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: '{}'
            }),
            criarProjeto: (descricao) => fetch('/api/Projetos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ descricao })
            }),
            deletarProjeto: (id) => fetch(`/api/Projetos/${id}`, {
                method: 'DELETE',
                credentials: 'include'
            }),
            listarTarefas: (projetoId) => fetch(`/api/Tarefas/Listartarefas/${projetoId}`, {
                credentials: 'include'
            }),
            criarTarefa: (projetoId, body) => fetch(`/api/Tarefas/projetos/${projetoId}/tarefas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(body)
            }),
            atualizarTarefa: (projetoId, tarefaId, body) => fetch(`/api/Tarefas/projetos/${projetoId}/tarefas/${tarefaId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(body)
            }),
            deletarTarefa: (projetoId, tarefaId) => fetch(`/api/Tarefas/projetos/${projetoId}/tarefas/${tarefaId}`, {
                method: 'DELETE',
                credentials: 'include'
            })
            
        };

        const Prioridade = { Alta: 0, Media: 1, Baixa: 2 };

        const COLUNAS = [
            { id: 'alta', titulo: 'Alta prioridade', colClass: 'col-alta', match: (t) => !t.concluida && normPrio(t.prioridade) === Prioridade.Alta },
            { id: 'media', titulo: 'Média prioridade', colClass: 'col-media', match: (t) => !t.concluida && normPrio(t.prioridade) === Prioridade.Media },
            { id: 'baixa', titulo: 'Baixa prioridade', colClass: 'col-baixa', match: (t) => !t.concluida && normPrio(t.prioridade) === Prioridade.Baixa },
            { id: 'concluidas', titulo: 'Concluídas', colClass: 'col-done', match: (t) => !!t.concluida }
        ];

        function normPrio(p) {
            if (p === 'Alta' || p === 0) return Prioridade.Alta;
            if (p === 'Media' || p === 'Média' || p === 1) return Prioridade.Media;
            if (p === 'Baixa' || p === 2) return Prioridade.Baixa;
            return Prioridade.Media;
        }

        let projetos = [];
        let projetoAtual = null;
        let tarefas = [];
        let draggedTarefaId = null;
        let modalTarefaBootstrap = null;
        let modalProjetoBootstrap = null;
        let defaultColumnForNew = 'media';

        function toast(msg, isError) {
            const el = document.createElement('div');
            el.className = 'alert ' + (isError ? 'alert-danger' : 'alert-success') + ' py-2 px-3 mb-2';
            el.textContent = msg;
            document.getElementById('toastArea').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        async function handleRes(res, okMsg) {
            let data = null;
            try { data = await res.json(); } catch { }
            if (!res.ok) {
                const msg = (data && data.message) || res.statusText || 'Erro na requisição';
                throw new Error(msg);
            }
            if (okMsg) toast(okMsg);
            return data;
        }

        async function carregarProjetos() {
            const res = await API.listProjetos();
            if (res.status === 401) {
                window.location.href = '/index.html';
                return;
            }
            projetos = await handleRes(res);
            renderListaProjetos();
            if (projetoAtual && !projetos.find(p => p.id === projetoAtual.id)) {
                projetoAtual = null;
                tarefas = [];
            }
            if (!projetoAtual && projetos.length) {
                selecionarProjeto(projetos[0].id);
            } else if (projetoAtual) {
                await carregarTarefas(projetoAtual.id);
            } else {
                mostrarBoardVazio();
            }
        }

        function renderListaProjetos() {
            const box = document.getElementById('projetoList');
            box.innerHTML = '';
            projetos.forEach(p => {
                const b = document.createElement('button');
                b.type = 'button';
                b.className = 'projeto-item' + (projetoAtual && projetoAtual.id === p.id ? ' active' : '');
                b.innerHTML = '<span class="folder-icon">📁</span><span style="flex:1;min-width:0;text-overflow:ellipsis;overflow:hidden;">' +
                    escapeHtml(p.descricao || ('Projeto #' + p.id)) + '</span>';
                b.onclick = () => selecionarProjeto(p.id);
                b.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (confirm('Excluir o projeto "' + (p.descricao || p.id) + '" e suas tarefas?')) {
                        excluirProjeto(p.id);
                    }
                };
                box.appendChild(b);
            });
            if (!projetos.length) {
                const hint = document.createElement('p');
                hint.className = 'sidebar-hint';
                hint.textContent = 'Nenhum projeto ainda. Clique em « Novo projeto ». Botão direito em um projeto para excluir.';
                box.appendChild(hint);
            }
        }

        async function selecionarProjeto(id) {
            projetoAtual = projetos.find(p => p.id === id) || null;
            renderListaProjetos();
            if (!projetoAtual) {
                mostrarBoardVazio();
                return;
            }
            await carregarTarefas(id);
        }

        async function carregarTarefas(projetoId) {
            const res = await API.listarTarefas(projetoId);
            if (res.status === 401) {
                window.location.href = '/index.html';
                return;
            }
            tarefas = await handleRes(res);
            renderBoard();
        }

        function mostrarBoardVazio() {
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('boardContent').style.display = 'none';
        }

        function renderBoard() {
            if (!projetoAtual) {
                mostrarBoardVazio();
                return;
            }
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('boardContent').style.display = 'flex';
            const title = projetoAtual.descricao || ('Projeto #' + projetoAtual.id);
            document.getElementById('boardTitle').textContent = title;
            const total = tarefas.length;
            const done = tarefas.filter(t => t.concluida).length;
            document.getElementById('boardMeta').textContent = total + ' tarefa' + (total !== 1 ? 's' : '') +
                (total ? ' · ' + done + ' concluída' + (done !== 1 ? 's' : '') : '');

            const cols = document.getElementById('boardColumns');
            cols.innerHTML = '';

            COLUNAS.forEach(col => {
                const listTasks = tarefas.filter(col.match);
                const colEl = document.createElement('div');
                colEl.className = 'column ' + col.colClass;
                colEl.dataset.columnId = col.id;

                const head = document.createElement('div');
                head.className = 'column-header';
                head.innerHTML = '<div class="column-title-row"><span class="col-dot"></span><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' +
                    col.titulo + '</span></div><span class="count">' + listTasks.length + '</span>';
                colEl.appendChild(head);

                const body = document.createElement('div');
                body.className = 'column-body';
                body.dataset.columnId = col.id;

                listTasks.forEach(t => body.appendChild(criarCard(t)));

                body.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    body.classList.add('drag-over');
                });
                body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
                body.addEventListener('drop', (e) => {
                    e.preventDefault();
                    body.classList.remove('drag-over');
                    onDropTarefa(col.id);
                });

                const addBtn = document.createElement('button');
                addBtn.type = 'button';
                addBtn.className = 'add-card-btn';
                addBtn.innerHTML = '+ Adicionar cartão';
                addBtn.onclick = () => abrirModalNovaTarefa(col.id);

                colEl.appendChild(body);
                colEl.appendChild(addBtn);
                cols.appendChild(colEl);
            });
        }

        function prioLabel(p) {
            const n = normPrio(p);
            if (n === Prioridade.Alta) return { text: 'Alta', cls: 'prio-alta', badge: 'prio-alta badge-fill' };
            if (n === Prioridade.Media) return { text: 'Média', cls: 'prio-media', badge: 'prio-media badge-fill' };
            return { text: 'Baixa', cls: 'prio-baixa', badge: 'prio-baixa badge-fill' };
        }

        function criarCard(t) {
            const div = document.createElement('div');
            const pl = prioLabel(t.prioridade);
            div.className = 'card-task ' + pl.cls;
            div.draggable = true;
            div.dataset.tarefaId = t.id;
            const descPrev = (t.descricao || '').trim().slice(0, 120);
            div.innerHTML =
                '<div class="card-actions">' +
                '<button type="button" class="btn-icon" data-del="' + t.id + '" title="Excluir">✕</button></div>' +
                '<span class="prio-badge ' + pl.badge + '">' + pl.text + '</span>' +
                '<div class="title">' + escapeHtml(t.titulo || '') + '</div>' +
                (descPrev ? '<div class="desc-preview">' + escapeHtml(descPrev) + (t.descricao && t.descricao.length > 120 ? '…' : '') + '</div>' : '');

            div.addEventListener('dragstart', () => {
                draggedTarefaId = t.id;
                div.style.opacity = '0.55';
                div.style.transform = 'rotate(2deg)';
            });
            div.addEventListener('dragend', () => {
                div.style.opacity = '1';
                div.style.transform = '';
                draggedTarefaId = null;
                document.querySelectorAll('.column-body.drag-over').forEach(el => el.classList.remove('drag-over'));
            });
            div.addEventListener('click', (e) => {
                if (e.target.closest('.btn-icon')) return;
                abrirModalEditarTarefa(t.id);
            });
            div.querySelector('[data-del]').addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm('Excluir esta tarefa?')) excluirTarefa(t.id);
            });
            return div;
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function tarefaPayloadFromColumn(colId, base) {
            const titulo = base.titulo;
            const descricao = base.descricao;
            const dataCriacao = base.dataCriacao || new Date().toISOString();
            if (colId === 'concluidas') {
                return {
                    titulo,
                    descricao,
                    concluida: true,
                    dataCriacao,
                    dataConclusao: base.dataConclusao || new Date().toISOString(),
                    prioridade: normPrio(base.prioridade)
                };
            }
            const prio = colId === 'alta' ? Prioridade.Alta : colId === 'media' ? Prioridade.Media : Prioridade.Baixa;
            return {
                titulo,
                descricao,
                concluida: false,
                dataCriacao,
                dataConclusao: null,
                prioridade: prio
            };
        }

        async function onDropTarefa(targetColumnId) {
            if (!draggedTarefaId || !projetoAtual) return;
            const t = tarefas.find(x => x.id === draggedTarefaId);
            if (!t) return;
            const payload = tarefaPayloadFromColumn(targetColumnId, t);
            try {
                await handleRes(
                    await API.atualizarTarefa(projetoAtual.id, draggedTarefaId, payload)
                );
                await carregarTarefas(projetoAtual.id);
            } catch (e) {
                toast(e.message, true);
            }
        }

        function abrirModalNovaTarefa(columnId) {
            defaultColumnForNew = columnId;
            document.getElementById('tarefaId').value = '';
            document.getElementById('modalTarefaTitle').textContent = 'Nova tarefa';
            document.getElementById('tarefaTitulo').value = '';
            document.getElementById('tarefaDescricao').value = '';
            document.getElementById('tarefaConcluida').checked = columnId === 'concluidas';
            const sel = document.getElementById('tarefaPrioridade');
            if (columnId === 'alta') sel.value = '0';
            else if (columnId === 'baixa') sel.value = '2';
            else sel.value = '1';
            document.getElementById('btnExcluirTarefa').style.display = 'none';
            modalTarefaBootstrap.show();
        }

        function abrirModalEditarTarefa(id) {
            const t = tarefas.find(x => x.id === id);
            if (!t) return;
            document.getElementById('tarefaId').value = t.id;
            document.getElementById('modalTarefaTitle').textContent = 'Editar tarefa';
            document.getElementById('tarefaTitulo').value = t.titulo || '';
            document.getElementById('tarefaDescricao').value = t.descricao || '';
            document.getElementById('tarefaPrioridade').value = String(normPrio(t.prioridade));
            document.getElementById('tarefaConcluida').checked = !!t.concluida;
            document.getElementById('btnExcluirTarefa').style.display = 'inline-block';
            modalTarefaBootstrap.show();
        }

        async function salvarTarefaModal() {
            const idField = document.getElementById('tarefaId').value;
            const titulo = document.getElementById('tarefaTitulo').value.trim();
            if (!titulo) {
                toast('Informe o título da tarefa.', true);
                return;
            }
            const descricao = document.getElementById('tarefaDescricao').value.trim() || null;
            const prioridade = parseInt(document.getElementById('tarefaPrioridade').value, 10);
            const concluida = document.getElementById('tarefaConcluida').checked;
            const baseDate = new Date().toISOString();

            const body = {
                titulo,
                descricao,
                concluida,
                dataCriacao: baseDate,
                dataConclusao: concluida ? (new Date().toISOString()) : null,
                prioridade
            };

            try {
                if (idField) {
                    const existente = tarefas.find(x => x.id === parseInt(idField, 10));
                    body.dataCriacao = existente && existente.dataCriacao ? existente.dataCriacao : baseDate;
                    if (concluida && existente && existente.dataConclusao) {
                        body.dataConclusao = existente.dataConclusao;
                    }
                    await handleRes(await API.atualizarTarefa(projetoAtual.id, parseInt(idField, 10), body));
                } else {
                    if (defaultColumnForNew === 'concluidas') {
                        body.concluida = true;
                        body.dataConclusao = new Date().toISOString();
                    } else {
                        body.concluida = false;
                        body.prioridade = defaultColumnForNew === 'alta' ? Prioridade.Alta : defaultColumnForNew === 'baixa' ? Prioridade.Baixa : Prioridade.Media;
                    }
                    await handleRes(await API.criarTarefa(projetoAtual.id, body), 'Tarefa criada.');
                }
                modalTarefaBootstrap.hide();
                await carregarTarefas(projetoAtual.id);
            } catch (e) {
                toast(e.message, true);
            }
        }

        async function excluirTarefa(id) {
            try {
                await handleRes(await API.deletarTarefa(projetoAtual.id, id));
                modalTarefaBootstrap.hide();
                await carregarTarefas(projetoAtual.id);
            } catch (e) {
                toast(e.message, true);
            }
        }

        async function excluirProjeto(id) {
            try {
                await handleRes(await API.deletarProjeto(id));
                if (projetoAtual && projetoAtual.id === id) {
                    projetoAtual = null;
                    tarefas = [];
                }
                await carregarProjetos();
                toast('Projeto removido.');
            } catch (e) {
                toast(e.message, true);
            }
        }

        document.getElementById('btnNovoProjeto').addEventListener('click', () => {
            document.getElementById('inputProjetoDesc').value = '';
            modalProjetoBootstrap.show();
        });

        document.getElementById('btnSalvarProjeto').addEventListener('click', async () => {
            const desc = document.getElementById('inputProjetoDesc').value.trim();
            if (!desc) {
                toast('Digite um nome para o projeto.', true);
                return;
            }
            try {
                const created = await handleRes(await API.criarProjeto(desc), 'Projeto criado.');
                modalProjetoBootstrap.hide();
                projetos.push(created);
                projetoAtual = created;
                renderListaProjetos();
                await carregarTarefas(created.id);
            } catch (e) {
                toast(e.message, true);
            }
        });

        document.getElementById('btnSalvarTarefa').addEventListener('click', salvarTarefaModal);
        document.getElementById('btnExcluirTarefa').addEventListener('click', () => {
            const id = parseInt(document.getElementById('tarefaId').value, 10);
            if (id && confirm('Excluir esta tarefa?')) excluirTarefa(id);
        });

        document.addEventListener('DOMContentLoaded', () => {
            modalTarefaBootstrap = new bootstrap.Modal(document.getElementById('modalTarefa'));
            modalProjetoBootstrap = new bootstrap.Modal(document.getElementById('modalProjeto'));
            carregarProjetos().catch(e => toast(e.message, true));
        });
        async function carregarUsuario() {

            try {

                const response = await fetch('/api/Auth/debug', {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await response.json();

                console.log(data);

                const claimNome = data.claims.find(c => c.type === "name");

                if (claimNome) {
                    document.getElementById('NameUser').innerText = claimNome.value;
                }

            } catch (error) {
                console.error('Erro ao carregar usuario:', error);
            }
        }

        carregarUsuario();
    </script>
</body>
</html>
