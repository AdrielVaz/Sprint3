<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Tela de Cadastro</title>
    <style>
        :root {
            --bg-deep: #0c1222;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.15);
            --text: #e8edf5;
            --text-muted: #8b9cb8;
            --sidebar-bg: rgba(18, 26, 46, 0.72);
            --sidebar-border: rgba(255, 255, 255, 0.06);
            --list-bg: rgba(248, 250, 252, 0.97);
            --list-border: rgba(15, 23, 42, 0.06);
            --card-bg: #ffffff;
            --column-width: 286px;
            --header-h: 56px;
            --radius-lg: 14px;
            --radius-md: 10px;
            --shadow-card: 0 4px 14px rgba(15, 23, 42, 0.08), 0 0 1px rgba(15, 23, 42, 0.06);
            --shadow-card-hover: 0 10px 28px rgba(15, 23, 42, 0.12), 0 0 1px rgba(15, 23, 42, 0.08);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Outfit", system-ui, sans-serif;
            color: var(--text);
            background-color: var(--bg-deep);
            background-image: radial-gradient(ellipse 120% 80% at 10% -20%, rgba(34, 211, 238, 0.18), transparent 50%), radial-gradient(ellipse 90% 60% at 100% 0%, rgba(99, 102, 241, 0.14), transparent 45%), radial-gradient(ellipse 70% 50% at 50% 100%, rgba(14, 165, 233, 0.12), transparent 55%);
            background-attachment: fixed;
        }
        .input-group-text {
            cursor: pointer;
        }

        .container {
            display: flex;
            flex-direction: column;
            margin: 100px auto;
            width: 400px;
            padding: 32px 40px;
            background: rgb(255, 255, 255);
            border-radius: 3px;
            box-shadow: rgba(0, 0, 0, 0.1) 0px 0px 10px;
            box-sizing: border-box;
        }

        .img-h1 {
            text-align: center;
        }

        .img-icon {
            width: 100px;
        }

        .brand-name {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(90deg, #999, #ccc, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* suporte extra */
            background-clip: text;
            color: transparent;
        }

        .form-label {
            font-weight: bold;
        }

        .terms {
            margin-bottom: 25px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        #terms{
            margin-top: 10px;
        }
        .form-label {
            font-weight: bold;
        }
        label {
            color: black
        }

        p {
            color: black
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="text-cente">
            <h1 class="img-h1"><img src="../Assets/ChatGPT Image 6 de mai. de 2026, 11_17_50.png" class="img-icon"
                    alt=""></h1>
            <p class="text-center text-primary fw-bold">Criar Conta</p>
            <p class="text-center text-secondary fw-bold">preencha os dados</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label" for="name">Nome Completo</label>
                <div class="input-group">
                    <i class="input-group-text">👤</i>
                    <input class="form-control" type="text" id="name" name="name" placeholder="Digite seu nome completo"
                        required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <div class="input-group">
                    <i class="input-group-text">📧</i>
                    <input class="form-control" type="email" id="email" name="email" placeholder="seu@email.com"
                        required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="password">Senha</label>
                <div class="input-group">
                    <i class="input-group-text">🔒</i>

                    <input class="form-control"
                           type="password"
                           id="password"
                           name="password"
                           placeholder="Crie uma senha forte"
                           required>

                    <span class="input-group-text toggle-password"
                          onclick="togglePassword()">👁️</span>
                </div>

                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>

                <small id="strengthText"></small>
            </div>

            <div class="mb-3">
                <label class="form-label" for="confirmPassword">Confirmar Senha</label>
                <div class="input-group">
                    <i class="input-group-text">🔒</i>
                    <input class="form-control" type="password" id="confirmPassword" name="confirmPassword"
                        placeholder="Confirme sua senha" required>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    Eu concordo com os <a href="">Termos de Serviço</a> e <a href="">Política de Privacidade</a>
                </label>
            </div>

            <button class="btn btn-primary w-100" type="submit" id="submitBtn">Cadastrar</button>
        </form>

        <div class="login-link">
            <p>Já tem uma conta? <a href="/">Faça login</a></p>
        </div>
        <div class="brand-name">TASKPI</div>
    </div>

    <script>
        // Função para mostrar/ocultar senha
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // Função para mostrar mensagens
        function showMessage(type, message) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            if (type === 'error') {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';

                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            } else if (type === 'success') {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
            }
        }

        // Função para validar força da senha
        function checkPasswordStrength(password) {
            let strength = 0;
            let message = '';

            if (password.length === 0) {
                return { strength: 0, message: 'Digite uma senha' };
            }

            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            switch (strength) {
                case 0:
                case 1:
                    message = 'Senha fraca';
                    break;
                case 2:
                case 3:
                    message = 'Senha média';
                    break;
                case 4:
                case 5:
                    message = 'Senha forte';
                    break;
            }

            return { strength: Math.min(strength, 5), message };
        }

        // Atualizar indicador de força da senha
        function updatePasswordStrength() {
            const password = document.getElementById('password').value;
            const { strength, message } = checkPasswordStrength(password);
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');

            let width = (strength / 5) * 100;
            let color = '';

            if (strength <= 2) {
                color = '#ff4444';
            } else if (strength <= 3) {
                color = '#ffaa44';
            } else {
                color = '#44ff44';
            }

            strengthBar.style.width = width + '%';
            strengthBar.style.backgroundColor = color;
            strengthText.textContent = message;
            strengthText.style.color = color;
        }

        // Validação de email
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Validação de nome
        function validateName(name) {
            return name.trim().length >= 3;
        }

        // Validação de senha
        function validatePassword(password) {
            return password.length >= 6;
        }

        // Validar formulário completo
        function validateForm() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;

            if (!validateName(name)) {
                showMessage('error', 'Nome deve ter pelo menos 3 caracteres!');
                return false;
            }

            if (!validateEmail(email)) {
                showMessage('error', 'Por favor, insira um email válido!');
                return false;
            }

            if (!validatePassword(password)) {
                showMessage('error', 'A senha deve ter pelo menos 6 caracteres!');
                return false;
            }

            if (password !== confirmPassword) {
                showMessage('error', 'As senhas não coincidem!');
                return false;
            }

            if (!terms) {
                showMessage('error', 'Você precisa aceitar os termos para continuar!');
                return false;
            }

            return true;
        }

        async function registerUser(userData) {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(userData)
            });

            let payload = {};
            try {
                payload = await response.json();
            } catch {
                payload = {};
            }

            if (!response.ok) {
                throw new Error(payload.message || 'Erro ao cadastrar usuario.');
            }

            return payload;
        }

        // Event listener do formulário
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Cadastrando...';

            const userData = {
                nome: name,
                email: email,
                senha: password
            };

            try {
                await registerUser(userData);
                showMessage('success', 'Cadastro realizado com sucesso! Redirecionando...');

                document.getElementById('registerForm').reset();
                updatePasswordStrength();

                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } catch (error) {
                showMessage('error', error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Cadastrar';
            }
        });

        // Event listener para força da senha
        document.getElementById('password').addEventListener('input', updatePasswordStrength);

        // Validação em tempo real do confirmar senha
        document.getElementById('confirmPassword').addEventListener('input', function () {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;

            if (password !== confirmPassword && confirmPassword.length > 0) {
                this.style.borderColor = '#ff4444';
            } else {
                this.style.borderColor = '#e1e1e1';
            }
        });

        // Efeito de animação nos inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function () {
                this.parentElement.style.transform = 'scale(1.02)';
            });

            input.addEventListener('blur', function () {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
